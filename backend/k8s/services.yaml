apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: datacove-ingress
  namespace: datacove
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/websocket-services: "datacove-api"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  tls:
  - hosts:
    - api.datacove.example.com
    - app.datacove.example.com
    secretName: datacove-tls
  rules:
  - host: api.datacove.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: datacove-api
            port:
              number: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: datacove-api
  namespace: datacove
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  selector:
    app: datacove
    tier: api
---
apiVersion: v1
kind: Service
metadata:
  name: datacove-worker
  namespace: datacove
spec:
  type: ClusterIP
  ports:
  - port: 8001
    targetPort: 8001
    name: worker
  selector:
    app: datacove
    tier: worker
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: datacove-uploads
  namespace: datacove
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-client
  resources:
    requests:
      storage: 100Gi
